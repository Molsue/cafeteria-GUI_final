<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食堂智能取餐器 · 设备监控大屏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 粒子背景 -->
  <canvas id="particleCanvas"></canvas>

  <!-- Loading 遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <svg viewBox="0 0 50 50">
        <circle class="spinner-track" cx="25" cy="25" r="20" fill="none" stroke-width="4"/>
        <circle class="spinner-head" cx="25" cy="25" r="20" fill="none" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <span>数据加载中...</span>
    </div>
  </div>

  <!-- 错误提示 Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ====== 顶部导航栏 ====== -->
  <header class="navbar">
    <div class="navbar-left">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M7 8h10M7 12h10M7 16h6"/>
          <circle cx="17" cy="16" r="2" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="navbar-title">食堂智能取餐器 · 设备监控大屏</h1>
    </div>
    <div class="navbar-right">
      <div class="refresh-indicator" id="refreshIndicator">
        <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        <span class="last-update-label">最后更新</span>
        <span class="last-update-time" id="lastUpdateTime">--:--:--</span>
      </div>
      <button class="btn-refresh" id="btnRefresh" title="立即刷新">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="dashboard">
    <!-- ====== 统计卡片区 ====== -->
    <section class="stat-cards" id="statCards">
      <div class="stat-card online" data-status="online">
        <div class="stat-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <div class="stat-card-info">
          <span class="stat-card-label">在线设备</span>
          <span class="stat-card-count" id="countOnline" data-target="0">0</span>
          <span class="stat-card-percent" id="percentOnline">0%</span>
        </div>
        <div class="stat-card-bar"></div>
      </div>

      <div class="stat-card offline" data-status="offline">
        <div class="stat-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
        </div>
        <div class="stat-card-info">
          <span class="stat-card-label">离线设备</span>
          <span class="stat-card-count" id="countOffline" data-target="0">0</span>
          <span class="stat-card-percent" id="percentOffline">0%</span>
        </div>
        <div class="stat-card-bar"></div>
      </div>

      <div class="stat-card alert" data-status="alert">
        <div class="stat-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="stat-card-info">
          <span class="stat-card-label">告警设备</span>
          <span class="stat-card-count" id="countAlert" data-target="0">0</span>
          <span class="stat-card-percent" id="percentAlert">0%</span>
        </div>
        <div class="stat-card-bar"></div>
      </div>

      <div class="stat-card maintenance" data-status="maintenance">
        <div class="stat-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        <div class="stat-card-info">
          <span class="stat-card-label">维护设备</span>
          <span class="stat-card-count" id="countMaintenance" data-target="0">0</span>
          <span class="stat-card-percent" id="percentMaintenance">0%</span>
        </div>
        <div class="stat-card-bar"></div>
      </div>
    </section>

    <!-- ====== 主体区域：表格 + 告警面板 ====== -->
    <div class="main-grid">
      <!-- 设备列表区域 -->
      <section class="table-section">
        <div class="section-header">
          <h2 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
            </svg>
            设备列表
          </h2>
          <span class="device-count-badge" id="deviceCountBadge">0 台</span>
        </div>

        <!-- 筛选工具栏 -->
        <div class="toolbar">
          <div class="search-box">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索设备ID、名称...">
          </div>
          <select id="filterCanteen" class="filter-select">
            <option value="">全部食堂</option>
          </select>
          <select id="filterStatus" class="filter-select">
            <option value="">全部状态</option>
            <option value="online">🟢 在线</option>
            <option value="offline">🔴 离线</option>
            <option value="alert">🟠 告警</option>
            <option value="maintenance">🔵 维护</option>
          </select>
          <button class="btn-clear-filter" id="btnClearFilter" title="清除筛选">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- 设备表格 -->
        <div class="table-wrapper">
          <table class="device-table" id="deviceTable">
            <thead>
              <tr>
                <th>设备ID</th>
                <th>设备名称</th>
                <th>食堂</th>
                <th>区域</th>
                <th>型号</th>
                <th>CPU%</th>
                <th>内存%</th>
                <th>在线率</th>
                <th>状态</th>
                <th>告警信息</th>
                <th>心跳时间</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <!-- 动态渲染 -->
            </tbody>
          </table>
          <!-- 空状态 -->
          <div class="empty-state" id="emptyState" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span>没有找到匹配的设备</span>
          </div>
        </div>
      </section>

      <!-- 告警面板 -->
      <aside class="alert-panel" id="alertPanel">
        <div class="section-header">
          <h2 class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            故障告警
          </h2>
          <span class="alert-count-badge" id="alertCountBadge">0</span>
        </div>
        <div class="alert-list" id="alertList">
          <!-- 动态渲染 -->
        </div>
        <div class="alert-empty" id="alertEmpty" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span>所有设备运行正常 🎉</span>
        </div>
      </aside>
    </div>
  </main>

  <!-- ====== 设备详情抽屉 ====== -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="deviceDrawer">
    <div class="drawer-header">
      <h3>设备详情</h3>
      <button class="drawer-close" id="drawerClose">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="drawer-body" id="drawerBody">
      <!-- 动态渲染 -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
